name: Apply SHC design theme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply approved interface
        shell: bash
        run: |
          mkdir -p src/assets
          echo '' | base64 -d > src/App.tsx
          echo '' | base64 -d > src/styles.css
          echo '' | base64 -d > index.html
          echo '' | base64 -d > src/assets/shc-logo.png
          rm -f .github/workflows/apply-theme.yml

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/styles.css src/assets/shc-logo.png index.html .github/workflows/apply-theme.yml
          git commit -m "Apply Saudi Health Council design theme"
          git push
