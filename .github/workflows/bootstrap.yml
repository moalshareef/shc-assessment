name: Bootstrap project files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore project files
        shell: bash
        run: |
          python - <<'PY'
          import base64, io, zipfile, pathlib
          data = base64.b64decode('''''')
          root = pathlib.Path('.')
          with zipfile.ZipFile(io.BytesIO(data)) as z:
              z.extractall(root)
          PY

      - name: Commit project files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # يمنع GitHub هذا الـ Workflow من إنشاء Workflow آخر تلقائيًا
          rm -f .github/workflows/deploy-pages.yml

          git add .
          git commit -m "Bootstrap platform project" || exit 0
          git push
